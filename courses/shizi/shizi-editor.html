                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 3000;
                display: flex;
                align-items: center;
                justify-content: center;
            `;
            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background: white;
                border-radius: var(--radius-lg);
                padding: var(--spacing-xl);
                max-width: 640px;
                width: 90%;
                max-height: 90vh;
                overflow-y: auto;
                box-shadow: var(--shadow-xl);
            `;
            modalContent.innerHTML = `
                <h2 style="margin-bottom: var(--spacing-md);">📋 批次貼上例句</h2>
                <p style="color: var(--text-secondary); font-size: 0.9em; margin-bottom: var(--spacing-md); line-height: 1.5;">
                    每行一筆，格式：<strong>詞組|例句（中文）|例句英文|例句西文</strong>。以詞組匹配本課詞組，只更新例句欄位。例句西文可留空。
                </p>
                <div class="form-field">
                    <label>貼上內容</label>
                    <textarea id="batchExamplesInput" style="min-height: 220px; width: 100%; font-family: inherit; padding: var(--spacing-sm); border: 1px solid var(--border-color); border-radius: var(--radius-md);" placeholder="国家|中国是一个很大的国家。|China is a very big country.|España es un país muy grande.&#10;作家|他是一位作家。|He is a writer.|"></textarea>
                </div>
                <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
                    <button class="btn btn-primary" onclick="applyBatchExamples(this)">套用</button>
                    <button class="btn btn-secondary" onclick="this.closest('.edit-modal').remove()">取消</button>
                </div>
            `;
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            modalContent.querySelector('#batchExamplesInput').focus();
        }

        function applyBatchExamples(btn) {
            const modal = btn.closest('.edit-modal');
            const textarea = document.getElementById('batchExamplesInput');
            if (!textarea || !modal) return;
            const text = (textarea.value || '').trim();
            if (!text) {
                alert('請貼上至少一筆例句內容');
                return;
            }
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let applied = 0;
            let skipped = 0;
            for (const line of lines) {
                const parts = line.split('|').map(p => p.trim());
                const phraseKey = (parts[0] || '').trim();
                if (!phraseKey) continue;
                const notes = parts[1] || '';
                const example_en = parts[2] || '';
                const example_es = parts[3] || '';
                let found = false;
                for (let i = 0; i < currentData.length; i++) {
                    const item = currentData[i];
                    const content = (item.content || '').trim();
                    const firstPart = content.split('|')[0].trim();
                    if (firstPart === phraseKey) {
                        currentData[i].notes = notes;
                        currentData[i].example_en = example_en;
                        currentData[i].example_es = example_es;
                        if (!item.subtype) currentData[i].subtype = 'phrase';
                        applied++;
                        found = true;
                        break;
                    }
                }
                if (!found) skipped++;
            }
            modal.remove();
            renderEditPanel();
            renderPreviewPanel();
            debounceSave();
            alert(`已套用 ${applied} 筆例句${skipped > 0 ? '，' + skipped + ' 筆未匹配到本課詞組' : ''}。`);
        }

        // ==================== 渲染預覽面板 ====================
        function renderPreviewPanel() {
            if (!currentLesson || !currentType || currentData.length === 0) {
                emptyPreviewState.style.display = 'block';
                return;
            }

            emptyPreviewState.style.display = 'none';
            
            const typeNames = {
                vocabulary: '字表',
                phrases: '詞組',
                dialogues: '對話',
                grammar: '語法',
                exercises: '練習',
                literacy_sentence: '識字句',
                reading_text: '閱讀短文'
            };

            // reading_text 需要特殊處理，顯示完整的 Markdown 渲染結果
            if (currentType === 'reading_text') {
                let html = `<div class="preview-section">
                    <h3>${typeNames[currentType]} 預覽</h3>
                    <div class="reading-preview-content">${currentData.length > 0 ? formatPreviewItem(currentData[0], currentType) : '<p style="color: var(--text-muted);">暫無內容</p>'}</div>
                </div>`;
                previewPanelContent.innerHTML = html;
                return;
            }

            let html = `<div class="preview-section">
                <h3>${typeNames[currentType]} 預覽 (${currentData.length} 項)</h3>`;

            currentData.forEach((item, index) => {
                html += `<div class="preview-item">
                    <div style="font-weight: var(--font-semibold); margin-bottom: var(--spacing-xs);">#${index + 1}</div>
                    <div>${formatPreviewItem(item, currentType)}</div>
                </div>`;
            });

            html += '</div>';
            previewPanelContent.innerHTML = html;
        }

        function formatPreviewItem(item, type) {
            switch(type) {
                case 'vocabulary': {
                    // 編輯器格式: { character, meaning: "pinyin|english", notes }
                    const [pinyin, english] = (item.meaning || '').split('|');
                    return `
                        <div style="font-size: 1.5em; font-weight: bold; margin-bottom: var(--spacing-xs);">${item.character || ''}</div>
                        <div style="color: var(--pinyin-color); margin-bottom: var(--spacing-xs);">${pinyin || ''}</div>
                        <div style="color: var(--meaning-color); margin-bottom: var(--spacing-xs);">${english || ''}</div>
                        ${item.notes ? `<div style="color: var(--text-secondary); font-size: 0.9em; margin-top: var(--spacing-sm);">${item.notes}</div>` : ''}
                    `;
                }
                case 'phrases': {
                    const parts = (item.content || '').split('|').map(s => s.trim());
                    const chinese = parts[0] || '';
                    const pinyin = parts[1] || '';
                    const english = parts[2] || '';
                    
                    let examplesHtml = '';
                    if (item.notes || item.example_en || item.example_es) {
                        examplesHtml = '<div style="margin-top: var(--spacing-md); padding-top: var(--spacing-md); border-top: 1px solid var(--border-light);">';
                        
                        if (item.notes) {
                            examplesHtml += `
                                <div style="margin-bottom: var(--spacing-sm);">
                                    <div style="font-weight: var(--font-semibold); color: var(--text-secondary); font-size: 0.85em; margin-bottom: var(--spacing-xs);">📝 例句（中文）：</div>
                                    <div style="color: var(--text-primary); font-size: 0.95em; line-height: 1.6;">${item.notes}</div>
                                </div>
                            `;
                        }
                        
                        if (item.example_en) {
                            examplesHtml += `
                                <div style="margin-bottom: var(--spacing-sm);">
                                    <div style="font-weight: var(--font-semibold); color: var(--english-color); font-size: 0.85em; margin-bottom: var(--spacing-xs);">🇬🇧 English：</div>
                                    <div style="color: var(--english-color); font-size: 0.9em; font-style: italic; line-height: 1.6;">${item.example_en}</div>
                                </div>
                            `;
                        }
                        
                        if (item.example_es) {
                            examplesHtml += `
                                <div style="margin-bottom: var(--spacing-sm);">
                                    <div style="font-weight: var(--font-semibold); color: var(--spanish-color); font-size: 0.85em; margin-bottom: var(--spacing-xs);">🇪🇸 Español：</div>
                                    <div style="color: var(--spanish-color); font-size: 0.9em; font-style: italic; line-height: 1.6;">${item.example_es}</div>
                                </div>
                            `;
                        }
                        
                        examplesHtml += '</div>';
                    }
                    
                    return `
                        <div style="font-size: 1.2em; font-weight: bold; margin-bottom: var(--spacing-xs);">${chinese}</div>
                        <div style="color: var(--pinyin-color);">${pinyin}</div>
                        <div style="color: var(--meaning-color);">${english}</div>
                        ${examplesHtml}
                    `;
                }
                case 'dialogues': {
                    const speaker = item.speaker_name ? `${item.speaker}: ${item.speaker_name}` : (item.speaker || '');
                    return `
                        <div style="display: flex; align-items: start; gap: var(--spacing-md);">
                            <div style="background: var(--primary-color); color: white; padding: var(--spacing-xs) var(--spacing-sm); border-radius: var(--radius-md); font-weight: bold; flex-shrink: 0;">
                                ${speaker || '?'}
                            </div>
                            <div style="flex: 1;">${item.content || ''}</div>
                        </div>
                        ${item.notes ? `<div style="color: var(--text-secondary); font-size: 0.85em; margin-top: var(--spacing-xs);">註釋：${item.notes}</div>` : ''}
                    `;
                }
                case 'grammar': {
                    return `
                        <div style="font-weight: bold; margin-bottom: var(--spacing-xs);">${item.chinese || ''}</div>
                        <div style="color: var(--text-secondary);">${item.english || ''}</div>
                    `;
                }
                case 'exercises': {
                    return `
                        <div style="font-weight: bold; margin-bottom: var(--spacing-xs);">${item.content || ''}</div>
                        <div style="color: var(--primary-color);">答案：${item.answer || ''}</div>
                        <div style="color: var(--text-secondary); font-size: 0.9em;">${item.subtype === 'fill_blank' ? '填空詞' : '選項'}：${item.options || ''}</div>
                    `;
                }
                case 'literacy_sentence': {
                    return `<div style="font-size: 1.1em; line-height: 1.8;">${item.content || ''}</div>`;
                }
                case 'reading_text': {
                    // 直接返回 HTML，因為內容可能包含 HTML 標籤
                    return `<div class="reading-text-preview">${item.content || ''}</div>`;
                }
                default: {
                    return '';
                }
            }
        }

        // ==================== 保存功能 ====================
        function debounceSave() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                // 自動保存（可選，目前需要手動點擊保存按鈕）
                // 如果需要自動保存，可以取消下面的註釋
                // if (currentLesson && currentType) {
                //     handleSave();
                // }
            }, 1000);
        }

        async function handleSave() {
            if (!currentLesson || !currentType) {
                showMessage('請先選擇課次和類型', 'error');
                return;
            }

            try {
                showMessage('💾 正在保存...', 'info');
                const updateData = await getUpdateDataForType(currentData, currentType);
                
                await db.collection('lessons').doc(currentLesson).set(updateData, { merge: true });
                
                showMessage('✅ 保存成功！', 'success');
            } catch (error) {
                console.error('保存失敗：', error);
                showMessage('保存失敗：' + error.message, 'error');
            }
        }

        async function getUpdateDataForType(data, type) {
            const doc = await db.collection('lessons').doc(currentLesson).get();
            const existingData = doc.exists ? doc.data() : {};
            
            const updateData = {};
            
            switch(type) {
                case 'vocabulary':
                    // 編輯器格式: { character: "...", meaning: "pinyin|english", notes: "..." }
                    // 轉換為 Firestore 格式: { content: "字|pinyin|english", notes: "..." }
                    updateData.vocabulary = data.map(item => {
                        const [pinyin, english] = (item.meaning || '').split('|');
                        return {
                            content: `${item.character || ''}|${pinyin || ''}|${english || ''}`,
                            notes: item.notes || ''
                        };
                    });
                    break;
                case 'phrases':
                    // 合併現有的 dialogues
                    const existingDialogues = (existingData.phrases || []).filter(p => p.subtype === 'dialogue');
                    updateData.phrases = [...data, ...existingDialogues];
                    break;
                case 'dialogues':
                    // 合併現有的 phrases（非對話）
                    const existingPhrases = (existingData.phrases || []).filter(p => p.subtype !== 'dialogue');
                    updateData.phrases = [...existingPhrases, ...data];
                    break;
                case 'grammar':
                    // 編輯器格式: { chinese: "...", english: "...", subtype: "rule" }
                    // 轉換為 Firestore 格式: { content: "中文|英文", subtype: "rule" }
                    updateData.grammar = data.map(item => {
                        return {
                            content: `${item.chinese || ''}|${item.english || ''}`,
                            subtype: item.subtype || 'rule'
                        };
                    });
                    break;
                case 'exercises':
                    updateData.exercises = data;
                    break;
                case 'literacy_sentence':
                    updateData.literacy_sentence = data[0]?.content || '';
                    break;
                case 'reading_text':
                    updateData.reading_text = data[0]?.content || '';
                    break;
            }
            
            // 更新 meta
            updateData.meta = {
                vocabulary_count: updateData.vocabulary ? updateData.vocabulary.length : (existingData.vocabulary?.length || 0),
                phrases_count: updateData.phrases ? updateData.phrases.length : (existingData.phrases?.length || 0),
                grammar_count: updateData.grammar ? updateData.grammar.length : (existingData.grammar?.length || 0),
                exercises_count: updateData.exercises ? updateData.exercises.length : (existingData.exercises?.length || 0),
                last_updated: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            return updateData;
        }

        // ==================== 工具函數 ====================
        function showMessage(text, type = 'info') {
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            document.body.appendChild(message);
            
            setTimeout(() => {
                message.style.animation = 'slideIn 0.3s reverse';
                setTimeout(() => message.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
