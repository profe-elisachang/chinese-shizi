<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>識字課程內容編輯器</title>
    <link rel="stylesheet" href="../../assets/css/nav-global.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="courses-config.js"></script>

    <style>
        /* ==================== CSS Variables (對齊 studio.html) ==================== */
        :root {
            /* 主色调 */
            --primary-color: #0891b2;
            --primary-light: #06b6d4;
            --primary-dark: #0e7490;
            
            /* 辅助色 */
            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --danger-color: #ef4444;
            
            /* 中性色 */
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            
            /* 背景色 */
            --bg-page: #f9fafb;
            --bg-card: #ffffff;
            --bg-hover: #f3f4f6;
            --bg-light: #e5e7eb;
            
            /* 边框色 */
            --border-light: #e5e7eb;
            --border-medium: #d1d5db;
            --border-dark: #9ca3af;
            
            /* 双语颜色 */
            --english-color: #0891b2;
            --spanish-color: #f59e0b;
            
            /* 字体 */
            --font-primary: 'Microsoft JhengHei', 'Noto Sans TC', 'PingFang TC', sans-serif;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            --text-3xl: 2rem;
            
            /* 间距 */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
            
            /* 圆角 */
            --radius-sm: 0.25rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            
            /* 阴影 */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
            
            /* 字重 */
            --font-normal: 400;
            --font-medium: 500;
            --font-semibold: 600;
            --font-bold: 700;

            /* Editor 專用變數 */
            --edit-panel-min-width: 5%;
            --edit-panel-max-width: 60%;
            --edit-panel-default-width: 40%;
            --edit-panel-collapsed-width: 60px;
            --resizer-width: 4px;
        }
        
        /* ==================== Global Styles ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary);
            background: var(--bg-page);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* ==================== Top Navigation ==================== */
        .top-nav {
            background: var(--bg-card);
            border-bottom: 2px solid var(--border-light);
            padding: var(--spacing-sm) var(--spacing-lg);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 40px;
        }

        .nav-content {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            max-width: 100%;
            margin: 0 auto;
        }

        .nav-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: var(--text-base);
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        .nav-separator {
            color: var(--text-muted);
        }

        .group-separator {
            margin: 0 var(--spacing-sm);
            font-weight: var(--font-bold);
        }

        /* ==================== Editor Header ==================== */
        .editor-header {
            position: fixed;
            top: 40px;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-bottom: 2px solid var(--border-light);
            padding: var(--spacing-md) var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 999;
            height: 70px;
        }

        .editor-title {
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
            color: var(--text-primary);
        }

        .editor-controls {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .control-group select {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-family: var(--font-primary);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-group select:hover {
            border-color: var(--primary-color);
        }

        .control-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        /* ==================== Type Tabs ==================== */
        .type-tabs {
            display: flex;
            gap: var(--spacing-sm);
            border-bottom: 2px solid var(--border-light);
        }

        .type-tab {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: var(--font-primary);
        }

        .type-tab:hover:not(:disabled) {
            color: var(--primary-color);
            background: var(--bg-hover);
        }

        .type-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: var(--bg-hover);
        }

        .type-tab:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== Buttons ==================== */
        .btn {
            padding: var(--spacing-sm) var(--spacing-lg);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-primary);
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border-medium);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== Editor Container ==================== */
        .editor-container {
            display: flex;
            height: calc(100vh - 110px);
            margin-top: 110px;
            position: relative;
        }

        /* ==================== Edit Panel ==================== */
        .edit-panel {
            width: var(--edit-panel-default-width);
            min-width: var(--edit-panel-min-width);
            max-width: var(--edit-panel-max-width);
            background: var(--bg-card);
            border-right: 2px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s ease;
        }

        .edit-panel.collapsed {
            width: var(--edit-panel-collapsed-width);
        }

        .edit-panel-header {
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-hover);
        }

        .edit-panel-title {
            font-size: var(--text-lg);
            font-weight: var(--font-bold);
            color: var(--text-primary);
        }

        .edit-panel-header-right {
            display: flex;
            gap: var(--spacing-sm);
        }

        .btn-add {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .edit-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-lg);
        }

        /* ==================== Form Item Card ==================== */
        .form-item-card {
            background: var(--bg-card);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-md);
            transition: all 0.3s;
            display: flex;
            align-items: stretch;
        }

        .form-item-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-md);
        }

        .form-item-card.dragging {
            opacity: 0.9;
            border-color: var(--primary-dark);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: none !important;
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            transform: rotate(-2deg) scale(1.02);
            background: var(--bg-card);
        }

        .form-item-card.placeholder {
            opacity: 0.3;
            background: var(--bg-light);
            border-style: dashed;
            border-color: var(--primary-color);
        }

        .form-item-card:not(.dragging) {
            transition: transform 0.2s ease-out;
        }
        
        .form-item-card.drag-over-top {
            border-top: 3px solid var(--primary-color);
        }
        
        .form-item-card.drag-over-bottom {
            border-bottom: 3px solid var(--primary-color);
        }

        .form-item-card.collapsed .form-item-body {
            display: none;
        }

        .form-item-card.expanded .form-item-content {
            padding: var(--spacing-lg);
        }

        .form-item-card.highlighted {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.2);
            background: rgba(8, 145, 178, 0.05);
        }

        /* Drag Bar */
        .drag-bar {
            width: 12px;
            background: var(--bg-light);
            border-right: 1px solid var(--border-medium);
            border-top-left-radius: var(--radius-lg);
            border-bottom-left-radius: var(--radius-lg);
            cursor: grab;
            user-select: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .drag-bar::before {
            content: '⋮';
            font-size: var(--text-xl);
            color: var(--text-muted);
            transition: all 0.2s;
            line-height: 1;
        }

        .drag-bar:hover {
            background: var(--primary-color);
        }

        .drag-bar:hover::before {
            color: white;
        }

        .drag-bar:active {
            cursor: grabbing;
            background: var(--primary-dark);
        }

        .form-item-card.dragging .drag-bar {
            background: var(--primary-dark);
        }

        .form-item-card.dragging .drag-bar::before {
            color: white;
        }

        /* Card Content */
        .form-item-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: var(--spacing-md);
        }

        .form-item-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            cursor: pointer;
            user-select: none;
        }

        .form-item-index {
            font-size: var(--text-base);
            font-weight: var(--font-bold);
            color: var(--text-muted);
            min-width: 30px;
        }

        .form-item-preview {
            flex: 1;
            font-size: var(--text-lg);
            font-weight: var(--font-semibold);
            color: var(--text-primary);
        }

        .form-item-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        /* 語法類型標籤（規則 / 例句） */
        .grammar-subtype-badge {
            flex-shrink: 0;
            padding: 2px 8px;
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: var(--font-semibold);
        }
        .grammar-subtype-badge.grammar-subtype-rule {
            background: rgba(8, 145, 178, 0.15);
            color: var(--primary-dark);
        }
        .grammar-subtype-badge.grammar-subtype-example {
            background: rgba(34, 197, 94, 0.2);
            color: #15803d;
        }

        .btn-edit, .btn-delete {
            padding: var(--spacing-xs) var(--spacing-md);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: var(--font-semibold);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit {
            background: var(--primary-color);
            color: white;
        }

        .btn-edit:hover {
            background: var(--primary-dark);
        }

        .btn-delete {
            background: var(--danger-color);
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .form-item-body {
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--border-light);
        }

        /* ==================== Form Fields ==================== */
        .form-field {
            margin-bottom: var(--spacing-md);
        }

        .form-field label {
            display: block;
            font-weight: var(--font-semibold);
            margin-bottom: var(--spacing-xs);
            color: var(--text-primary);
            font-size: var(--text-sm);
        }

        .form-field.required label::after {
            content: " *";
            color: var(--danger-color);
        }

        .form-field input,
        .form-field textarea,
        .form-field select {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-family: var(--font-primary);
            transition: all 0.3s;
        }

        .form-field input:focus,
        .form-field textarea:focus,
        .form-field select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        .form-field textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* ==================== Resizer ==================== */
        .resizer {
            width: var(--resizer-width);
            background: var(--border-light);
            cursor: col-resize;
            transition: background 0.2s;
            flex-shrink: 0;
            z-index: 100;
        }

        .resizer:hover {
            background: var(--primary-color);
        }

        .resizer:active {
            background: var(--primary-dark);
        }

        /* ==================== Preview Panel ==================== */
        .preview-panel {
            flex: 1;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-panel-header {
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 2px solid var(--border-light);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .preview-panel-title {
            font-size: var(--text-lg);
            font-weight: var(--font-bold);
            color: var(--text-primary);
        }

        .btn-toggle-edit {
            padding: var(--spacing-xs) var(--spacing-md);
            background: var(--bg-light);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: var(--text-lg);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-toggle-edit:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .preview-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-xl);
        }

        /* ==================== Empty State ==================== */
        .empty-state {
            text-align: center;
            padding: var(--spacing-2xl);
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-lg);
        }

        .empty-state-text {
            font-size: var(--text-lg);
        }

        /* ==================== Preview Content ==================== */
        .preview-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
        }

        .preview-section h3 {
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
        }

        .preview-item {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border-light);
        }

        .preview-item:last-child {
            border-bottom: none;
        }

        /* ==================== Message ==================== */
        .message {
            position: fixed;
            top: 120px;
            right: var(--spacing-xl);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-md);
            font-weight: var(--font-semibold);
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
            box-shadow: var(--shadow-lg);
        }

        .message.success {
            background: var(--secondary-color);
            color: white;
        }

        .message.error {
            background: var(--danger-color);
            color: white;
        }

        .message.info {
            background: var(--primary-color);
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ==================== Responsive ==================== */
        @media (max-width: 1024px) {
            .editor-container {
                flex-direction: column;
            }

            .edit-panel {
                width: 100%;
                max-width: 100%;
                height: 50%;
            }

            .resizer {
                display: none;
            }

            .preview-panel {
                height: 50%;
            }
        }

        /* ==================== Reading Text Styles ==================== */
        .reading-preview-content {
            font-size: var(--text-base);
            line-height: 1.6;
            color: var(--text-primary);
        }

        .reading-text-preview {
            font-size: var(--text-base);
            line-height: 1.6;
            color: var(--text-primary);
        }

        /* 中文文字樣式 */
        .reading-text-preview .chinese-text,
        .reading-preview-content .chinese-text {
            color: var(--text-primary);
            font-size: 1.1em;
        }

        /* 英文文字樣式 */
        .reading-text-preview .english-text,
        .reading-preview-content .english-text {
            color: var(--english-color);
            font-size: 0.95em;
            font-style: italic;
        }

        /* 折疊區塊樣式 */
        .reading-text-preview details,
        .reading-preview-content details {
            margin: var(--spacing-md) 0;
            padding: var(--spacing-md);
            background: var(--bg-light);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--primary-color);
        }

        .reading-text-preview details summary,
        .reading-preview-content details summary {
            cursor: pointer;
            font-weight: var(--font-semibold);
            color: var(--primary-color);
            padding: var(--spacing-sm);
            user-select: none;
            font-size: 0.9em;
        }

        .reading-text-preview details summary:hover,
        .reading-preview-content details summary:hover {
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
        }

        .reading-text-preview details[open] summary,
        .reading-preview-content details[open] summary {
            margin-bottom: var(--spacing-sm);
        }

        .reading-text-preview details .english-text,
        .reading-preview-content details .english-text {
            display: block;
            padding: var(--spacing-sm);
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-content">
            <a href="../../index.html" class="nav-link">Home</a>
            <span class="nav-separator">|</span>
            <a href="lesson.html" class="nav-link">Literacy</a>
            <span class="nav-separator">|</span>
            <a href="studio.html" class="nav-link">Studio</a>
            <span class="nav-separator">|</span>
            <a href="markdown-admin.html" class="nav-link">Markdown Admin</a>
        </div>
    </nav>

    <!-- Editor Header -->
    <div class="editor-header">
        <div class="editor-title">
            📝 識字課程內容編輯器
        </div>
        <div class="editor-controls">
            <div class="control-group">
                <select id="courseSelect">
                    <option value="shizi">識字</option>
                    <option value="hsk2">HSK 2</option>
                </select>
            </div>
            <div class="control-group">
                <select id="lessonSelect">
                    <option value="">-- 請選擇課次 --</option>
                </select>
            </div>
            <!-- 类型切换 -->
            <div class="control-group">
                <div class="type-tabs">
                    <button class="type-tab active" id="tabVocabulary" data-type="vocabulary" disabled>📝 字表</button>
                    <button class="type-tab" id="tabPhrases" data-type="phrases" disabled>📚 詞組</button>
                    <button class="type-tab" id="tabDialogues" data-type="dialogues" disabled>💬 對話</button>
                    <button class="type-tab" id="tabGrammar" data-type="grammar" disabled>📖 語法</button>
                    <button class="type-tab" id="tabExercises" data-type="exercises" disabled>✏️ 練習</button>
                    <button class="type-tab" id="tabLiteracySentence" data-type="literacy_sentence" disabled>📄 識字句</button>
                    <button class="type-tab" id="tabReading" data-type="reading_text" disabled>📖 閱讀短文</button>
                </div>
            </div>
            <!-- 保存按钮 -->
            <div class="control-group">
                <button class="btn btn-primary" id="btnSave" disabled>💾 保存到 Firestore</button>
            </div>
        </div>
    </div>

    <!-- Editor Container -->
    <div class="editor-container">
        <!-- Edit Panel -->
        <div class="edit-panel" id="editPanel">
            <div class="edit-panel-header">
                <div class="edit-panel-title" id="editPanelTitle">請選擇課次和類型</div>
                <div class="edit-panel-header-right">
                    <button class="btn btn-secondary" id="btnBatchExamples" style="display: none;">📋 批次貼上例句</button>
                    <button class="btn-add" id="btnAdd" style="display: none;">+ 新增</button>
                </div>
            </div>
            <div class="edit-panel-content" id="editPanelContent">
                <div class="empty-state" id="emptyEditState">
                    <div class="empty-state-icon">📝</div>
                    <div class="empty-state-text">請選擇課次和類型開始編輯</div>
                </div>
            </div>
        </div>

        <!-- Resizer -->
        <div class="resizer" id="resizer"></div>

        <!-- Preview Panel -->
        <div class="preview-panel">
            <div class="preview-panel-header">
                <div class="preview-panel-title">實時預覽</div>
                <button class="btn-toggle-edit" id="btnToggleEdit">◀</button>
            </div>
            <div class="preview-panel-content" id="previewPanelContent">
                <div class="empty-state" id="emptyPreviewState">
                    <div class="empty-state-icon">👁️</div>
                    <div class="empty-state-text">預覽將在此顯示</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== Firebase 配置 ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDMDTDwDP0mEXwgJdwsXVMB2IFi9Q5zfyU",
            authDomain: "shizi-with-elisa.firebaseapp.com",
            projectId: "shizi-with-elisa",
            storageBucket: "shizi-with-elisa.firebasestorage.app",
            messagingSenderId: "46368268308",
            appId: "1:46368268308:web:5847aeb7b239b16d624701"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        auth.signInAnonymously();

        // ==================== 全局變數 ====================
        let currentData = [];
        let currentType = '';
        let currentCourse = 'shizi';
        let currentLesson = '';
        let saveTimeout = null;
        let draggedElement = null;
        let placeholderElement = null;
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let draggedIndex = -1;
        let editingIndex = -1;

        // ==================== DOM 元素 ====================
        const lessonSelect = document.getElementById('lessonSelect');
        const typeTabs = document.querySelectorAll('.type-tab');
        const editPanel = document.getElementById('editPanel');
        const editPanelContent = document.getElementById('editPanelContent');
        const editPanelTitle = document.getElementById('editPanelTitle');
        const btnAdd = document.getElementById('btnAdd');
        const btnBatchExamples = document.getElementById('btnBatchExamples');
        const btnSave = document.getElementById('btnSave');
        const btnToggleEdit = document.getElementById('btnToggleEdit');
        const previewPanelContent = document.getElementById('previewPanelContent');
        const emptyEditState = document.getElementById('emptyEditState');
        const emptyPreviewState = document.getElementById('emptyPreviewState');
        const resizer = document.getElementById('resizer');

        // ==================== 初始化 ====================
        function updateEditorTabsForCourse(courseId) {
            const config = COURSES_CONFIG[courseId];
            const tabVocabulary = document.getElementById('tabVocabulary');
            const showVocabulary = config.hasVocabulary !== false;
            if (tabVocabulary) {
                tabVocabulary.style.display = showVocabulary ? '' : 'none';
            }
            if (!showVocabulary && currentType === 'vocabulary') {
                currentType = '';
            }
        }

        function getDefaultEditorTab(courseId) {
            const config = COURSES_CONFIG[courseId];
            return config.hasVocabulary !== false ? 'vocabulary' : 'phrases';
        }

        function handleCourseChange() {
            currentCourse = document.getElementById('courseSelect').value;
            populateLessonSelect(lessonSelect, currentCourse);
            updateEditorTabsForCourse(currentCourse);
            currentLesson = '';
            currentType = '';
            currentData = [];
            disableAllTabs();
            btnSave.disabled = true;
            lessonSelect.value = '';
            renderEditPanel();
            renderPreviewPanel();
        }

        populateLessonSelect(lessonSelect, currentCourse);
        updateEditorTabsForCourse(currentCourse);
        document.getElementById('courseSelect').addEventListener('change', handleCourseChange);
        lessonSelect.addEventListener('change', handleLessonChange);
        typeTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                if (!tab.disabled) {
                    switchTypeTab(tab.dataset.type);
                }
            });
        });
        btnAdd.addEventListener('click', handleAdd);
        if (btnBatchExamples) btnBatchExamples.addEventListener('click', showBatchExamplesModal);
        btnSave.addEventListener('click', handleSave);
        btnToggleEdit.addEventListener('click', toggleEditPanel);

        // Resizer 功能
        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.addEventListener('mousemove', handleResize);
            document.addEventListener('mouseup', () => {
                isResizing = false;
                document.removeEventListener('mousemove', handleResize);
            });
        });

        function handleResize(e) {
            if (!isResizing) return;
            const container = editPanel.parentElement;
            const containerRect = container.getBoundingClientRect();
            const newWidth = ((e.clientX - containerRect.left) / containerRect.width) * 100;
            const clampedWidth = Math.max(20, Math.min(60, newWidth));
            editPanel.style.width = clampedWidth + '%';
        }

        function toggleEditPanel() {
            editPanel.classList.toggle('collapsed');
            btnToggleEdit.textContent = editPanel.classList.contains('collapsed') ? '▶' : '◀';
        }

        // ==================== 課程選擇 ====================
        async function handleLessonChange() {
            const lesson = lessonSelect.value;
            if (!lesson) {
                currentData = [];
                currentLesson = '';
                currentType = '';
                disableAllTabs();
                renderEditPanel();
                renderPreviewPanel();
                return;
            }

            currentLesson = lesson;
            enableAllTabs();
            
            // 如果還沒有選擇類型，默認選擇第一個可用 tab
            if (!currentType) {
                switchTypeTab(getDefaultEditorTab(currentCourse));
            } else {
                await loadData();
            }
        }

        function enableAllTabs() {
            const config = COURSES_CONFIG[currentCourse];
            typeTabs.forEach(tab => {
                if (tab.dataset.type === 'vocabulary' && config.hasVocabulary === false) {
                    tab.disabled = true;
                } else {
                    tab.disabled = false;
                }
            });
        }

        function disableAllTabs() {
            typeTabs.forEach(tab => tab.disabled = true);
        }

        // ==================== 類型切換 ====================
        async function switchTypeTab(type) {
            if (!currentLesson) {
                showMessage('請先選擇課次', 'error');
                return;
            }

            currentType = type;
            updateTabState(type);
            await loadData();
        }

        function updateTabState(activeType) {
            typeTabs.forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.type === activeType) {
                    tab.classList.add('active');
                }
            });
        }

        // ==================== 載入數據 ====================
        async function loadData() {
            if (!currentLesson || !currentType) {
                currentData = [];
                renderEditPanel();
                renderPreviewPanel();
                return;
            }

            try {
                const doc = await db.collection('lessons').doc(currentLesson).get();
                
                if (doc.exists) {
                    const data = doc.data();
                    currentData = getDataForType(data, currentType) || [];
                } else {
                    currentData = [];
                }
                
                renderEditPanel();
                renderPreviewPanel();
                btnSave.disabled = false;
            } catch (error) {
                console.error('載入數據失敗：', error);
                showMessage('載入數據失敗：' + error.message, 'error');
            }
        }

        function getDataForType(data, type) {
            switch(type) {
                case 'vocabulary':
                    // Firestore 格式: { content: "字|pinyin|english", notes: "..." }
                    // 轉換為編輯器格式: { character: "...", meaning: "pinyin|english", notes: "..." }
                    const vocab = data.vocabulary || [];
                    return vocab.map(item => {
                        if (item.content) {
                            const parts = item.content.split('|');
                            return {
                                character: parts[0] || '',
                                meaning: `${parts[1] || ''}|${parts[2] || ''}`,
                                notes: item.notes || ''
                            };
                        }
                        // 如果已經是編輯器格式，直接返回
                        return item;
                    });
                case 'phrases':
                    return (data.phrases || []).filter(p => p.subtype !== 'dialogue');
                case 'dialogues':
                    return (data.phrases || []).filter(p => p.subtype === 'dialogue');
                case 'grammar':
                    // Firestore 格式: { content: "中文|英文", subtype: "rule" }
                    // 轉換為編輯器格式: { chinese: "...", english: "...", subtype: "rule" }
                    const grammar = data.grammar || [];
                    return grammar.map(item => {
                        if (item.content) {
                            const parts = item.content.split('|');
                            return {
                                chinese: parts[0] || '',
                                english: parts[1] || '',
                                subtype: item.subtype || 'rule'
                            };
                        }
                        // 如果已經是編輯器格式，直接返回
                        return item;
                    });
                case 'exercises':
                    return data.exercises || [];
                case 'literacy_sentence':
                    return data.literacy_sentence ? [{ content: data.literacy_sentence }] : [];
                case 'reading_text':
                    return data.reading_text ? [{ content: data.reading_text }] : [];
                default:
                    return [];
            }
        }

        // ==================== 渲染編輯面板 ====================
        function renderEditPanel() {
            if (!currentLesson || !currentType) {
                emptyEditState.style.display = 'block';
                editPanelTitle.textContent = '請選擇課次和類型';
                btnAdd.style.display = 'none';
                if (btnBatchExamples) btnBatchExamples.style.display = 'none';
                return;
            }

            emptyEditState.style.display = 'none';
            
            const typeNames = {
                vocabulary: '字表',
                phrases: '詞組',
                dialogues: '對話',
                grammar: '語法',
                exercises: '練習',
                literacy_sentence: '識字句',
                reading_text: '閱讀短文'
            };
            
            // reading_text 是單一文字區域，不需要卡片列表和新增按鈕
            if (currentType === 'reading_text') {
                btnAdd.style.display = 'none';
                if (btnBatchExamples) btnBatchExamples.style.display = 'none';
                editPanelTitle.textContent = typeNames[currentType];
                const content = currentData.length > 0 ? currentData[0].content : '';
                editPanelContent.innerHTML = `
                    <div class="form-field required">
                        <label>閱讀短文內容（支援 Markdown 和 HTML）</label>
                        <textarea id="reading-text-content" style="min-height: 400px; font-family: monospace; font-size: 0.9em; width: 100%;" onchange="updateReadingText(this.value)">${content}</textarea>
                        <div style="margin-top: var(--spacing-sm); color: var(--text-secondary); font-size: 0.85em; line-height: 1.6; padding: var(--spacing-md); background: var(--bg-light); border-radius: var(--radius-md);">
                            💡 <strong>使用提示：</strong><br>
                            1. 中文段落：使用 <code>&lt;span class="chinese-text"&gt;中文內容&lt;/span&gt;</code><br>
                            2. 英文翻譯（折疊）：使用 <code>&lt;details&gt;&lt;summary&gt;English Translation&lt;/summary&gt;&lt;span class="english-text"&gt;英文翻譯&lt;/span&gt;&lt;/details&gt;</code><br>
                            3. 英文翻譯（直接顯示）：使用 <code>&lt;span class="english-text"&gt;英文翻譯&lt;/span&gt;</code>
                        </div>
                    </div>
                `;
                return;
            }
            
            btnAdd.style.display = 'block';
            if (btnBatchExamples) btnBatchExamples.style.display = (currentType === 'phrases') ? 'inline-block' : 'none';
            
            editPanelTitle.textContent = `${typeNames[currentType]} (${currentData.length} 項)`;

            if (currentData.length === 0) {
                editPanelContent.innerHTML = '<div class="empty-state"><div class="empty-state-text">暫無數據，點擊「+ 新增」開始添加</div></div>';
                return;
            }

            editPanelContent.innerHTML = currentData.map((item, index) => {
                return createFormItemCard(item, index);
            }).join('');

            // 綁定事件
            bindFormItemEvents();
        }

        function createFormItemCard(item, index) {
            const preview = getItemPreview(item, currentType);
            const grammarSubtype = (currentType === 'grammar') ? (item.subtype || 'rule') : '';
            const grammarBadge = grammarSubtype ? `<span class="grammar-subtype-badge grammar-subtype-${grammarSubtype}">${grammarSubtype === 'example' ? '例句' : '規則'}</span>` : '';
            return `
                <div class="form-item-card expanded" data-index="${index}">
                    <div class="drag-bar"></div>
                    <div class="form-item-content">
                        <div class="form-item-header">
                            <div class="form-item-index">${index + 1}</div>
                            ${grammarBadge}
                            <div class="form-item-preview">${preview}</div>
                            <div class="form-item-actions">
                                <button class="btn-edit" onclick="handleEdit(${index})">編輯</button>
                                <button class="btn-delete" onclick="handleDelete(${index})">刪除</button>
                            </div>
                        </div>
                        <div class="form-item-body" id="form-body-${index}" style="display: none;">
                            ${createFormFields(item, index)}
                        </div>
                    </div>
                </div>
            `;
        }

        function getItemPreview(item, type) {
            switch(type) {
                case 'vocabulary':
                    const [pinyin, english] = (item.meaning || '').split('|');
                    return `${item.character || ''} | ${pinyin || ''} | ${english || ''}`;
                case 'phrases':
                    return `${item.content || ''}`;
                case 'dialogues':
                    const speaker = item.speaker_name ? `${item.speaker}: ${item.speaker_name}` : (item.speaker || '');
                    return `${speaker ? `[${speaker}] ` : ''}${item.content || ''}`;
                case 'grammar':
                    return `${item.chinese || ''} | ${item.english || ''}`;
                case 'exercises':
                    return `${item.content || ''} (${item.subtype === 'fill_blank' ? '填空' : '選擇'})`;
                case 'literacy_sentence':
                    return item.content || '';
                case 'reading_text':
                    return item.content ? item.content.substring(0, 100) + '...' : '';
                default:
                    return '';
            }
        }

        function createFormFields(item, index) {
            // 根據不同類型生成不同的表單字段
            switch(currentType) {
                case 'vocabulary':
                    const [pinyin, english] = (item.meaning || '').split('|');
                    return `
                        <div class="form-field required">
                            <label>字</label>
                            <input type="text" id="field-character-${index}" value="${item.character || ''}" onchange="updateItemField(${index}, 'character', this.value)">
                        </div>
                        <div class="form-field required">
                            <label>拼音</label>
                            <input type="text" id="field-pinyin-${index}" value="${pinyin || ''}" onchange="updateItemField(${index}, 'pinyin', this.value)">
                        </div>
                        <div class="form-field required">
                            <label>英文</label>
                            <input type="text" id="field-english-${index}" value="${english || ''}" onchange="updateItemField(${index}, 'english', this.value)">
                        </div>
                        <div class="form-field">
                            <label>例句 (notes)</label>
                            <textarea id="field-notes-${index}" onchange="updateItemField(${index}, 'notes', this.value)">${item.notes || ''}</textarea>
                        </div>
                    `;
                case 'phrases':
                    return `
                        <div class="form-field required">
                            <label>詞組</label>
                            <input type="text" id="field-content-${index}" value="${item.content || ''}" placeholder="詞組|拼音|英文 (例如：通知|tōngzhī|notify, inform)" onchange="updateItemField(${index}, 'content', this.value)">
                        </div>
                        <div class="form-field">
                            <label>例句（中文）</label>
                            <textarea id="field-notes-${index}" onchange="updateItemField(${index}, 'notes', this.value)">${item.notes || ''}</textarea>
                        </div>
                        <div class="form-field">
                            <label>例句英文翻译</label>
                            <textarea id="field-example_en-${index}" onchange="updateItemField(${index}, 'example_en', this.value)">${item.example_en || ''}</textarea>
                        </div>
                        <div class="form-field">
                            <label>例句西班牙语翻译</label>
                            <textarea id="field-example_es-${index}" onchange="updateItemField(${index}, 'example_es', this.value)">${item.example_es || ''}</textarea>
                        </div>
                    `;
                case 'dialogues':
                    return `
                        <div class="form-field required">
                            <label>說話者 (A/B/C...)</label>
                            <input type="text" id="field-speaker-${index}" value="${item.speaker || ''}" placeholder="A" onchange="updateItemField(${index}, 'speaker', this.value)">
                        </div>
                        <div class="form-field">
                            <label>說話者名稱 (可選)</label>
                            <input type="text" id="field-speaker-name-${index}" value="${item.speaker_name || ''}" placeholder="張三" onchange="updateItemField(${index}, 'speaker_name', this.value)">
                        </div>
                        <div class="form-field required">
                            <label>對話內容</label>
                            <textarea id="field-content-${index}" onchange="updateItemField(${index}, 'content', this.value)">${item.content || ''}</textarea>
                        </div>
                        <div class="form-field">
                            <label>註釋 (用於分組)</label>
                            <input type="text" id="field-notes-${index}" value="${item.notes || ''}" placeholder="对话一" onchange="updateItemField(${index}, 'notes', this.value)">
                        </div>
                    `;
                case 'grammar': {
                    const isExample = item.subtype === 'example';
                    const ruleValue = (item.chinese || '') + (item.chinese || item.english ? '|' : '') + (item.english || '');
                    if (isExample) {
                        return `
                        <div class="form-field required">
                            <label>例句（中文）</label>
                            <input type="text" id="field-chinese-${index}" value="${item.chinese || ''}" onchange="updateItemField(${index}, 'chinese', this.value)">
                        </div>
                        <div class="form-field">
                            <label>例句英文翻譯（可選）</label>
                            <textarea id="field-english-${index}" onchange="updateItemField(${index}, 'english', this.value)">${item.english || ''}</textarea>
                        </div>
                    `;
                    }
                    return `
                        <div class="form-field required">
                            <label>規則</label>
                            <textarea id="field-grammar-content-${index}" placeholder="中文|Eng" onchange="updateGrammarRuleField(${index}, this.value)" style="min-height: 80px;">${ruleValue}</textarea>
                        </div>
                    `;
                }
                case 'exercises':
                    const exerciseType = item.subtype || 'fill_blank';
                    return `
                        <div class="form-field required">
                            <label>題型</label>
                            <select id="field-subtype-${index}" onchange="updateItemField(${index}, 'subtype', this.value)">
                                <option value="fill_blank" ${exerciseType === 'fill_blank' ? 'selected' : ''}>填空題</option>
                                <option value="multiple_choice" ${exerciseType === 'multiple_choice' ? 'selected' : ''}>選擇題</option>
                            </select>
                        </div>
                        <div class="form-field required">
                            <label>題目</label>
                            <textarea id="field-content-${index}" onchange="updateItemField(${index}, 'content', this.value)">${item.content || ''}</textarea>
                        </div>
                        <div class="form-field required">
                            <label>答案</label>
                            <input type="text" id="field-answer-${index}" value="${item.answer || ''}" placeholder="A 或 A|B (多選用|分隔)" onchange="updateItemField(${index}, 'answer', this.value)">
                        </div>
                        <div class="form-field required">
                            <label>${exerciseType === 'fill_blank' ? '填空詞' : '選項'}</label>
                            <input type="text" id="field-options-${index}" value="${item.options || ''}" placeholder="${exerciseType === 'fill_blank' ? '被' : 'A.能|B.可以|C.想|D.会'}" onchange="updateItemField(${index}, 'options', this.value)">
                        </div>
                    `;
                case 'literacy_sentence':
                    return `
                        <div class="form-field required">
                            <label>識字句</label>
                            <textarea id="field-content-${index}" style="min-height: 150px;" onchange="updateItemField(${index}, 'content', this.value)">${item.content || ''}</textarea>
                        </div>
                    `;
                default:
                    return '<div>未知類型</div>';
            }
        }

        function updateReadingText(value) {
            if (currentData.length === 0) {
                currentData.push({ content: value });
            } else {
                currentData[0].content = value;
            }
            renderPreviewPanel();
            debounceSave();
        }

        function updateItemField(index, field, value) {
            if (index < 0 || index >= currentData.length) return;
            
            const item = currentData[index];
            
            // 根據不同類型處理字段更新
            if (currentType === 'vocabulary') {
                if (field === 'pinyin' || field === 'english') {
                    const pinyin = field === 'pinyin' ? value : ((item.meaning || '').split('|')[0] || '');
                    const english = field === 'english' ? value : ((item.meaning || '').split('|')[1] || '');
                    item.meaning = `${pinyin}|${english}`;
                } else {
                    item[field] = value;
                }
            } else if (currentType === 'dialogues') {
                item[field] = value;
                // 確保對話類型字段
                if (!item.subtype) item.subtype = 'dialogue';
                if (!item.type) item.type = 'phrases';
            } else if (currentType === 'phrases') {
                item[field] = value;
                // 確保詞組類型字段
                if (!item.subtype) item.subtype = 'phrase';
            } else if (currentType === 'grammar') {
                item[field] = value;
                // 確保語法類型字段
                if (!item.subtype) item.subtype = 'rule';
            } else {
                item[field] = value;
            }
            
            // 更新預覽
            renderEditPanel();
            renderPreviewPanel();
            debounceSave();
        }

        function updateGrammarRuleField(index, value) {
            if (currentType !== 'grammar' || index < 0 || index >= currentData.length) return;
            const parts = (value || '').split('|').map(s => s.trim());
            currentData[index].chinese = parts[0] || '';
            currentData[index].english = parts[1] || '';
            if (!currentData[index].subtype) currentData[index].subtype = 'rule';
            renderEditPanel();
            renderPreviewPanel();
            debounceSave();
        }

        function bindFormItemEvents() {
            // 綁定拖拽事件
            const cards = document.querySelectorAll('.form-item-card');
            cards.forEach(card => {
                const dragBar = card.querySelector('.drag-bar');
                if (dragBar) {
                    dragBar.addEventListener('mousedown', (e) => startDrag(e, card));
                }
                
                // 綁定展開/收合事件
                const header = card.querySelector('.form-item-header');
                if (header) {
                    header.addEventListener('click', (e) => {
                        // 如果點擊的是按鈕，不觸發展開/收合
                        if (e.target.closest('.btn-edit') || e.target.closest('.btn-delete')) {
                            return;
                        }
                        toggleCardExpand(card);
                    });
                }
            });
        }

        function toggleCardExpand(card) {
            card.classList.toggle('expanded');
            card.classList.toggle('collapsed');
            const body = card.querySelector('.form-item-body');
            if (body) {
                body.style.display = card.classList.contains('expanded') ? 'block' : 'none';
            }
        }

        // ==================== 拖拽功能 ====================
        function startDrag(e, card) {
            e.preventDefault();
            e.stopPropagation();
            
            isDragging = true;
            draggedElement = card;
            draggedIndex = parseInt(card.dataset.index);
            
            // 記錄初始位置和偏移
            const rect = card.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            
            // 創建佔位符元素
            placeholderElement = card.cloneNode(true);
            placeholderElement.classList.remove('dragging');
            placeholderElement.classList.add('placeholder');
            placeholderElement.style.height = rect.height + 'px';
            
            // 插入佔位符
            card.parentNode.insertBefore(placeholderElement, card.nextSibling);
            
            // 設置拖拽元素樣式
            card.classList.add('dragging');
            card.style.width = rect.width + 'px';
            card.style.left = rect.left + 'px';
            card.style.top = rect.top + 'px';
            
            // 綁定事件
            document.addEventListener('mousemove', handleDrag);
            document.addEventListener('mouseup', stopDrag);
            
            // 初始位置
            updateDragPosition(e);
        }

        function updateDragPosition(e) {
            if (!draggedElement) return;
            
            const left = e.clientX - dragOffsetX;
            const top = e.clientY - dragOffsetY;
            
            draggedElement.style.left = left + 'px';
            draggedElement.style.top = top + 'px';
        }

        function handleDrag(e) {
            if (!isDragging || !draggedElement || !placeholderElement) return;
            
            // 更新拖拽元素位置
            updateDragPosition(e);
            
            // 找到鼠標下方的卡片
            const cards = Array.from(document.querySelectorAll('.form-item-card:not(.dragging):not(.placeholder)'));
            
            // 清除所有拖放指示器
            cards.forEach(card => {
                card.classList.remove('drag-over-top', 'drag-over-bottom');
            });
            
            // 找到最接近的卡片
            let closestCard = null;
            let closestDistance = Infinity;
            let insertBefore = true;
            
            const mouseY = e.clientY;
            
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const cardMiddle = rect.top + rect.height / 2;
                const distance = Math.abs(mouseY - cardMiddle);
                
                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestCard = card;
                    insertBefore = mouseY < cardMiddle;
                }
            });
            
            // 移動佔位符到新位置
            if (closestCard) {
                if (insertBefore) {
                    closestCard.classList.add('drag-over-top');
                    closestCard.parentNode.insertBefore(placeholderElement, closestCard);
                } else {
                    closestCard.classList.add('drag-over-bottom');
                    closestCard.parentNode.insertBefore(placeholderElement, closestCard.nextSibling);
                }
            }
        }

        function stopDrag(e) {
            if (!isDragging) return;
            
            isDragging = false;
            document.removeEventListener('mousemove', handleDrag);
            document.removeEventListener('mouseup', stopDrag);
            
            // 清除所有拖放指示器
            const cards = Array.from(document.querySelectorAll('.form-item-card'));
            cards.forEach(card => {
                card.classList.remove('drag-over-top', 'drag-over-bottom');
            });
            
            if (draggedElement && placeholderElement) {
                // 計算新位置
                const allCards = Array.from(document.querySelectorAll('.form-item-card:not(.dragging)'));
                let newIndex = allCards.indexOf(placeholderElement);
                
                // 調整索引（因為佔位符本身也算一個元素）
                if (newIndex > draggedIndex) {
                    newIndex--;
                }
                
                // 如果位置改變了，更新數據
                if (newIndex !== draggedIndex && newIndex >= 0 && newIndex < currentData.length) {
                    const item = currentData.splice(draggedIndex, 1)[0];
                    currentData.splice(newIndex, 0, item);
                    renderEditPanel();
                    renderPreviewPanel();
                    debounceSave();
                } else {
                    // 如果位置沒變，只需移除拖拽狀態
                    if (placeholderElement && placeholderElement.parentNode) {
                        placeholderElement.parentNode.removeChild(placeholderElement);
                    }
                    if (draggedElement) {
                        draggedElement.classList.remove('dragging');
                        draggedElement.style.position = '';
                        draggedElement.style.left = '';
                        draggedElement.style.top = '';
                        draggedElement.style.width = '';
                        draggedElement.style.zIndex = '';
                    }
                }
            }
            
            // 清理
            draggedElement = null;
            placeholderElement = null;
            draggedIndex = -1;
        }

        // ==================== 新增/編輯/刪除 ====================

            debounceSave();

        function getEmptyItem() {
            switch(currentType) {

                case 'phrases':
                    return { content: '', notes: '', example_en: '', example_es: '', subtype: 'phrase' };
                case 'dialogues':
                    return { content: '', speaker: '', speaker_name: '', notes: '', subtype: 'dialogue', type: 'phrases' };
                case 'grammar':
                    return { chinese: '', english: '', subtype: 'rule' };
                case 'exercises':
                    return { content: '', answer: '', options: '', subtype: 'fill_blank' };
                case 'literacy_sentence':
                    return { content: '' };
                case 'reading_text':

        function updateGrammarModalLabels() {
            const sel = document.getElementById('modal-grammar-subtype');
            const ruleWrap = document.getElementById('modal-grammar-rule-wrap');
            const exampleWrap = document.getElementById('modal-grammar-example-wrap');
            const contentField = document.getElementById('modal-grammar-content');
            const chineseField = document.getElementById('modal-chinese');
            const englishField = document.getElementById('modal-english');
            if (!sel) return;
            const isExample = sel.value === 'example';
            if (ruleWrap) ruleWrap.style.display = isExample ? 'none' : 'block';
            if (exampleWrap) exampleWrap.style.display = isExample ? 'block' : 'none';
            if (isExample && contentField && chineseField && englishField) {
                const parts = (contentField.value || '').split('|').map(s => s.trim());
                chineseField.value = parts[0] || '';
                englishField.value = parts[1] || '';
            } else if (!isExample && contentField && chineseField && englishField) {
                contentField.value = (chineseField.value || '') + (chineseField.value || englishField.value ? '|' : '') + (englishField.value || '');
            }
        }

        function saveModalItem() {
            const modal = window.currentModal;
            if (!modal) return;
            
            let newItem = {};
            
            switch(currentType) {
                case 'vocabulary':
                    const pinyin = document.getElementById('modal-pinyin').value.trim();
                    const english = document.getElementById('modal-english').value.trim();
                    newItem = {
                        character: document.getElementById('modal-character').value.trim(),
                        meaning: `${pinyin}|${english}`,
                        notes: document.getElementById('modal-notes').value.trim()
                    };
                    if (!newItem.character || !pinyin || !english) {
                        alert('請填寫所有必填字段');
                        return;
                    }
                    break;
                case 'phrases':
                    const contentValue = document.getElementById('modal-content').value.trim();
                    newItem = {
                        content: contentValue,
                        notes: document.getElementById('modal-notes').value.trim(),
                        example_en: document.getElementById('modal-example_en').value.trim(),
                        example_es: document.getElementById('modal-example_es').value.trim(),
                        subtype: 'phrase'
                    };
                    if (!newItem.content) {
                        alert('請填寫詞組欄位（格式：詞組|拼音|英文）');
                        return;
                    }
                    // 驗證格式
                    const parts = contentValue.split('|');
                    if (parts.length !== 3 || !parts[0] || !parts[1] || !parts[2]) {
                        alert('詞組格式錯誤，請使用：詞組|拼音|英文（例如：通知|tōngzhī|notify, inform）');
                        return;
                    }
                    break;
                case 'dialogues':
                    newItem = {
                        content: document.getElementById('modal-content').value.trim(),
                        speaker: document.getElementById('modal-speaker').value.trim(),
                        speaker_name: document.getElementById('modal-speaker-name').value.trim(),
                        notes: document.getElementById('modal-notes').value.trim(),
                        subtype: 'dialogue',
                        type: 'phrases'
                    };
                    if (!newItem.content || !newItem.speaker) {
                        alert('請填寫所有必填字段');
                        return;
                    }
                    break;
                case 'grammar': {
                    const grammarSubtype = document.getElementById('modal-grammar-subtype').value;
                    if (grammarSubtype === 'rule') {
                        const contentVal = (document.getElementById('modal-grammar-content') || {}).value || '';
                        const trimmed = contentVal.trim();
                        const parts = trimmed.split('|').map(s => s.trim());
                        newItem = {
                            chinese: parts[0] || '',
                            english: parts[1] || '',
                            subtype: 'rule'
                        };
                        if (!trimmed) {
                            alert('請填寫規則（格式：中文|Eng）');
                            return;
                        }
                    } else {
                        newItem = {
                            chinese: (document.getElementById('modal-chinese') || {}).value.trim(),
                            english: (document.getElementById('modal-english') || {}).value.trim(),
                            subtype: 'example'
                        };
                        if (!newItem.chinese) {
                            alert('請填寫例句（中文）');
                            return;
                        }
                    }
                    break;
                }
                case 'exercises':
                    newItem = {
                        content: document.getElementById('modal-content').value.trim(),
                        answer: document.getElementById('modal-answer').value.trim(),
                        options: document.getElementById('modal-options').value.trim(),
                        subtype: document.getElementById('modal-subtype').value
                    };
                    if (!newItem.content || !newItem.answer || !newItem.options) {
                        alert('請填寫所有必填字段');
                        return;
                    }
                    break;
                case 'literacy_sentence':
                    newItem = {
                        content: document.getElementById('modal-content').value.trim()
                    };
                    if (!newItem.content) {
                        alert('請填寫識字句');
                        return;
                    }
                    break;
            }
            
            // 保存或更新
            if (editingIndex >= 0) {
                currentData[editingIndex] = newItem;
            } else {
                currentData.push(newItem);
            }
            
            closeModal();
            renderEditPanel();
            renderPreviewPanel();
            debounceSave();
        }

        function closeModal() {
            if (window.currentModal) {
                window.currentModal.remove();
                window.currentModal = null;
                window.currentModalItem = null;
            }
            editingIndex = -1;
        }

        function showBatchExamplesModal() {

                alert('請先選擇詞組並確保有詞組數據');

            }

            modal.className = 'edit-modal';
