<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>識字課程管理 Studio</title>
    <link rel="stylesheet" href="../../assets/css/nav-global.css">

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <!-- Cloudinary Upload Widget -->
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <script src="courses-config.js"></script>

    <style>
        /* ==================== CSS Variables (對齊 structure.md) ==================== */
        :root {
            /* 主色调 */
            --primary-color: #0891b2;
            --primary-light: #06b6d4;
            --primary-dark: #0e7490;
            
            /* 辅助色 */
            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --danger-color: #ef4444;
            
            /* 中性色 */
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            
            /* 背景色 */
            --bg-page: #f9fafb;
            --bg-card: #ffffff;
            --bg-hover: #f3f4f6;
            --bg-light: #e5e7eb;
            
            /* 边框色 */
            --border-light: #e5e7eb;
            --border-medium: #d1d5db;
            --border-dark: #9ca3af;
            
            /* 特殊用途 */
            --pinyin-color: #dc2626;
            --character-color: #1f2937;
            --meaning-color: #059669;
            
            /* 字体 */
            --font-primary: 'Microsoft JhengHei', 'Noto Sans TC', 'PingFang TC', sans-serif;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            --text-3xl: 2rem;
            --char-size-medium: 2rem;
            --char-size-large: 3rem;
            
            /* 间距 */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
            
            /* 圆角 */
            --radius-sm: 0.25rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            
            /* 阴影 */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.15);
            
            /* 字重 */
            --font-normal: 400;
            --font-medium: 500;
            --font-semibold: 600;
            --font-bold: 700;

            /* Studio 專用變數 */
            --edit-panel-min-width: 5%;
            --edit-panel-max-width: 60%;
            --edit-panel-default-width: 40%;
            --edit-panel-collapsed-width: 60px;
            --resizer-width: 4px;
        }
        
        /* ==================== Global Styles ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-primary);
            font-size: var(--text-base);
            color: var(--text-primary);
            background: var(--bg-page);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
        }

        /* ==================== Top Navigation ==================== */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* ==================== Studio Header ==================== */
        .studio-header {
            background: var(--bg-card);
            padding: var(--spacing-lg) var(--spacing-xl);
            border-bottom: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .studio-title {
            font-size: var(--text-2xl);
            font-weight: var(--font-bold);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .studio-controls {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            align-items: center;
        }

        /* ==================== 批量发布按钮组 ==================== */
        .batch-publish-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .batch-publish-buttons .btn {
            padding: 12px 24px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .batch-publish-buttons .btn-success {
            background: var(--secondary-color);
            color: white;
        }

        .batch-publish-buttons .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16,185,129,0.4);
        }

        .batch-publish-buttons .btn-secondary {
            background: var(--text-secondary);
            color: white;
        }

        .batch-publish-buttons .btn-secondary:hover {
            background: #4b5563;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(107,114,128,0.4);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .control-group label {
            font-weight: var(--font-semibold);
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .control-group select {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-family: var(--font-primary);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-group select:hover {
            border-color: var(--primary-color);
        }

        .control-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        /* ==================== Type Tabs ==================== */
        .type-tabs {
            display: flex;
            gap: var(--spacing-sm);
            border-bottom: 2px solid var(--border-light);
        }

        .type-tab {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: var(--font-primary);
        }

        .type-tab:hover:not(:disabled) {
            color: var(--primary-color);
            background: var(--bg-hover);
        }

        .type-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .type-tab:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== Main Container ==================== */
        .studio-container {
            display: flex;
            height: calc(100vh - 140px); /* 減去導航和標題高度 */
            position: relative;
        }

        /* ==================== Edit Panel ==================== */
        .edit-panel {
            background: var(--bg-card);
            border-right: 2px solid var(--border-light);
            display: flex;
            flex-direction: column;
            width: var(--edit-panel-default-width);
            min-width: var(--edit-panel-min-width);
            max-width: var(--edit-panel-max-width);
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .edit-panel.collapsed {
            width: var(--edit-panel-collapsed-width);
        }

        .edit-panel-header {
            padding: var(--spacing-lg);
            border-bottom: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--primary-color);
            color: white;
            min-height: 60px;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }

        .edit-panel-header-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex: 1;
        }

        .edit-panel-header-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .edit-panel.collapsed .edit-panel-header {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            justify-content: center;
            padding: var(--spacing-md);
        }

        .edit-panel-title {
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
        }

        .edit-panel.collapsed .edit-panel-title {
            font-size: var(--text-base);
        }

        .btn-add,
        .btn-expand-all,
        .btn-collapse-all {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-add:hover,
        .btn-expand-all:hover,
        .btn-collapse-all:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-expand-all,
        .btn-collapse-all {
            padding: var(--spacing-sm) var(--spacing-md);
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-sm);
            font-size: var(--text-base);
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            white-space: nowrap;
            font-weight: var(--font-semibold);
        }

        .btn-expand-all:hover,
        .btn-collapse-all:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 1);
            transform: none;
            box-shadow: none;
        }

        .edit-panel.collapsed .btn-add,
        .edit-panel.collapsed .btn-expand-all,
        .edit-panel.collapsed .btn-collapse-all {
            display: none;
        }

        .edit-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-lg);
        }

        .edit-panel.collapsed .edit-panel-content {
            display: none;
        }

        /* ==================== Form Item Card ==================== */
        .form-item-card {
            background: var(--bg-light);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 0;
            margin-bottom: var(--spacing-lg);
            transition: all 0.3s;
            position: relative;
            display: flex;
            align-items: stretch;
        }

        .form-item-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-md);
        }

        .form-item-card.dragging {
            opacity: 0.8;
            transform: scale(0.98);
            border-color: var(--primary-dark);
            box-shadow: 0 0 0 2px var(--primary-dark);
            transition: none !important;  /* 拖拽時禁用過渡動畫 */
        }

        /* 其他卡片平滑讓位 */
        .form-item-card:not(.dragging) {
            transition: transform 0.2s ease-out;
        }

        .form-item-card.collapsed .form-item-content {
            padding: var(--spacing-md) var(--spacing-lg);
        }

        .form-item-card.collapsed .form-item-body {
            display: none;
        }

        .form-item-card.expanded .form-item-content {
            padding: var(--spacing-lg);
        }

        .form-item-card.highlighted {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.2);
            background: rgba(8, 145, 178, 0.05);
        }

        .form-item-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }

        .form-item-header:hover {
            background: var(--bg-hover);
            border-radius: var(--radius-md);
            padding: var(--spacing-xs);
            margin: calc(-1 * var(--spacing-xs));
        }

        .form-item-card.collapsed .form-item-header {
            margin-bottom: 0;
        }

        .form-item-toggle-icon {
            font-size: var(--text-base);
            color: var(--text-primary);
            background: var(--bg-light);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-sm);
            padding: var(--spacing-xs) var(--spacing-sm);
            transition: all 0.3s;
            flex-shrink: 0;
            font-weight: var(--font-semibold);
            min-width: 40px;
            text-align: center;
            cursor: pointer;
        }

        .form-item-toggle-icon:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .form-item-card.expanded .form-item-toggle-icon {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .form-item-preview {
            flex: 1;
            text-align: center;
            font-size: 2rem;
            font-weight: var(--font-bold);
            color: var(--character-color);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-item-card.collapsed .form-item-preview {
            font-size: 2rem;
        }

        .form-item-body {
            transition: all 0.3s ease;
        }

        /* 左側拖拽條 */
        .drag-bar {
            width: 12px;
            background: var(--bg-light);
            border-right: 1px solid var(--border-medium);
            border-top-left-radius: var(--radius-lg);
            border-bottom-left-radius: var(--radius-lg);
            cursor: grab;
            user-select: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            pointer-events: auto;
        }

        .drag-bar::before {
            content: '⋮';
            font-size: var(--text-xl);
            color: var(--text-muted);
            transition: all 0.2s;
            line-height: 1;
            display: block;
        }

        .drag-bar:hover {
            background: var(--primary-color);
        }

        .drag-bar:hover::before {
            color: white;
        }

        .drag-bar:active {
            cursor: grabbing;
            background: var(--primary-dark);
        }

        .form-item-card.dragging .drag-bar {
            background: var(--primary-dark);
        }

        .form-item-card.dragging .drag-bar::before {
            color: white;
        }

        /* 卡片內容區域 */
        .form-item-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-item-title {
            flex: 1;
            font-weight: var(--font-semibold);
            color: var(--text-primary);
        }

        .btn-delete-item {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: var(--spacing-md);
        }

        .btn-delete-item:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .form-item-header .publish-toggle {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            flex-shrink: 0;
        }

        .form-item-header .publish-status {
            font-size: 0.75rem;
            font-weight: var(--font-semibold);
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
        }

        .form-item-header .publish-status.published {
            color: rgba(255, 255, 255, 1);
        }

        .form-item-header .publish-status.unpublished {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-item-header .toggle-switch {
            flex-shrink: 0;
        }

        .form-field {
            margin-bottom: var(--spacing-md);
        }

        .form-field label {
            display: block;
            font-weight: var(--font-semibold);
            margin-bottom: var(--spacing-xs);
            color: var(--text-primary);
            font-size: var(--text-sm);
        }

        .form-field.required label::after {
            content: " *";
            color: var(--danger-color);
        }

        .form-field input,
        .form-field textarea,
        .form-field select {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            font-family: var(--font-primary);
            transition: all 0.3s;
        }

        .form-field input:focus,
        .form-field textarea:focus,
        .form-field select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        .form-field textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-field small {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: var(--spacing-xs);
        }

        .btn-upload-cloudinary {
            display: block;
            margin-top: var(--spacing-sm);
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: var(--font-semibold);
            font-family: var(--font-primary);
            background: var(--text-secondary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-upload-cloudinary:hover {
            background: #4b5563;
            transform: translateY(-1px);
        }

        .publish-toggle {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: var(--secondary-color);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        /* ==================== Resizer ==================== */
        .resizer {
            width: var(--resizer-width);
            background: var(--border-light);
            cursor: col-resize;
            position: relative;
            transition: background 0.3s;
            z-index: 10;
        }

        .resizer:hover {
            background: var(--primary-color);
        }

        .resizer.resizing {
            background: var(--primary-color);
        }

        .resizer::before {
            content: '';
            position: absolute;
            left: -2px;
            right: -2px;
            top: 0;
            bottom: 0;
        }

        /* ==================== Preview Panel ==================== */
        .preview-panel {
            flex: 1;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-panel-header {
            padding: var(--spacing-lg);
            border-bottom: 2px solid var(--border-light);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .preview-panel-title {
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
            color: var(--primary-color);
        }

        .btn-toggle-edit {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--text-lg);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-toggle-edit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .preview-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-xl);
        }

        /* ==================== Preview Display (類似 lesson-presentation.html) ==================== */
        .preview-display {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            gap: var(--spacing-xl);
            text-align: left;
            max-width: 1200px;
            margin: 0 auto;
        }

        .preview-display .character {
            font-size: clamp(3.5rem, 7vw, 6rem);
            font-weight: var(--font-bold);
            color: var(--character-color);
            margin: 0;
            padding: 0;
            line-height: 1.1;
        }

        .preview-display .pinyin {
            font-size: clamp(1.5rem, 3vw, 2.4rem);
            color: var(--pinyin-color);
            margin: 0;
            padding: 0;
            font-weight: var(--font-medium);
        }

        .preview-display .meaning {
            font-size: clamp(1.4rem, 2.8vw, 2.2rem);
            color: var(--meaning-color);
            margin: 0;
            padding: 0;
            font-weight: var(--font-semibold);
        }

        .preview-display .breakdown {
            font-size: var(--text-xl);
            color: var(--text-secondary);
            margin: 0;
            padding: var(--spacing-lg);
            background: var(--bg-light);
            border-radius: var(--radius-md);
            width: 100%;
        }

        .preview-display .preview-section {
            width: 100%;
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-lg);
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
        }

        .preview-display .preview-section-title {
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
            color: var(--primary-color);
            margin-bottom: var(--spacing-md);
        }

        .preview-display .preview-section-content {
            font-size: var(--text-lg);
            line-height: 1.8;
            color: var(--text-primary);
        }

    <script>
        // ==================== Firebase 配置 ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDMDTDwDP0mEXwgJdwsXVMB2IFi9Q5zfyU",
            authDomain: "shizi-with-elisa.firebaseapp.com",
            projectId: "shizi-with-elisa",
            storageBucket: "shizi-with-elisa.firebasestorage.app",
            messagingSenderId: "46368268308",
            appId: "1:46368268308:web:5847aeb7b239b16d624701"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        auth.signInAnonymously();

        // ==================== 全局變數 ====================
        let currentData = [];
        let currentType = 'component';
        let currentCourse = 'shizi';
        let currentLesson = '';
        let saveTimeout = null;
        let draggedElement = null;
        let clickTimeout = null;
        let lastClickIndex = -1;
        let lastClickTime = 0;
        let isDragging = false;
        let dragHandlersInitialized = false;
        let dragOffsetY = 0;  // 滑鼠在卡片內的 Y 偏移
        let dragInitialRect = null;  // 初始卡片位置信息
        let currentPlaceholder = null;  // 當前 placeholder 元素
        let lastAfterElement = null;  // 上次插入位置，避免重複計算
        let pendingUploadTarget = null;  // { index, field } for Cloudinary upload

        const MARKDOWN_FIELDS = new Set([
            'book_explanation',
            'story',
            'pronunciation_cue',
            'phrases'
        ]);

        const CLOUDINARY_WIDGET_STYLES = {
            palette: {
                window: "#FFFFFF",
                windowBorder: "#0891b2",
                tabIcon: "#0891b2",
                menuIcons: "#0891b2",
                textDark: "#000000",
                textLight: "#FFFFFF",
                link: "#0891b2",
                action: "#0891b2",
                inProgress: "#0891b2",
                complete: "#28a745",
                error: "#dc3545",
                sourceBg: "#0891b2"
            }
        };

        // ==================== 工具函數 ====================
        function showMessage(text, type = 'info') {
            const div = document.createElement('div');
            div.className = `status-message status-${type}`;
            div.textContent = text;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        function sanitizeData(data) {
            return data.map(item => {
                const clean = {};
                Object.entries(item).forEach(([key, value]) => {
                    if (value !== undefined && value !== '') {
                        clean[key] = value;
                    }
                });
                return clean;
            });
        }

        // 字形補丁顯示邏輯（對齊 structure.md）
        function renderCharacterDisplay(char) {
            if (char.display_image && char.display_image.trim()) {
                return `<img src="${char.display_image.trim()}" class="img-comp" alt="comp" onerror="this.style.display='none';">`;
            }
            if (char.character && typeof char.character === 'string' && char.character.trim().toLowerCase().startsWith('http')) {
                return `<img src="${char.character.trim()}" class="img-comp" alt="comp" onerror="this.style.display='none';">`;
            }
            return char.character || '';
        }

        // Markdown 渲染（對齊 structure.md）
        function renderMarkdown(text) {
            if (!text) return '';
            let html = marked.parse(text);
            // 處理圖片分類
            html = html.replace(
                /<img src="([^"]+)" alt="--Image of: --([^"]+)"/g,
                (match, src, type) => {
                    return `<img src="${src}" class="img-${type}" alt="${type}" loading="lazy">`;
                }
            );
            return html;
        }

        // 防抖保存
        function debounceSave() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveToFirebase();
            }, 1000);
        }

        // ==================== 課程切換 ====================
        function updateStudioTabsForCourse(courseId) {
            const config = COURSES_CONFIG[courseId];
            const tabComponent = document.getElementById('tabComponent');
            if (config.hasComponents) {
                tabComponent.style.display = '';
            } else {
                tabComponent.style.display = 'none';
                if (currentType === 'component') {
                    currentType = 'target';
                    updateTabState('target');
                }
            }
        }

        function handleCourseChange() {
            currentCourse = document.getElementById('courseSelect').value;
            populateLessonSelect(document.getElementById('lessonSelect'), currentCourse);
            updateStudioTabsForCourse(currentCourse);
            currentLesson = '';
            currentData = [];
            currentType = 'component';
            updateTabState('component');
            document.getElementById('tabComponent').disabled = true;
            document.getElementById('tabTarget').disabled = true;
            document.getElementById('lessonSelect').value = '';
            renderEditPanel();
            renderPreviewPanel();
        }

        // ==================== 載入資料 ====================
        async function loadData() {
            const lesson = document.getElementById('lessonSelect').value;

            if (!lesson) {
                currentData = [];
                currentPreviewIndex = -1;
                currentLesson = '';
                document.getElementById('tabComponent').disabled = true;
                document.getElementById('tabTarget').disabled = true;
                renderEditPanel();
                renderPreviewPanel();
                return;
            }

            const config = COURSES_CONFIG[currentCourse];
            document.getElementById('tabComponent').disabled = !config.hasComponents;
            document.getElementById('tabTarget').disabled = false;

            if (!currentType || (currentType === 'component' && !config.hasComponents)) {
                currentType = 'target';
                updateTabState('target');
            }

            currentLesson = lesson;
            await loadDataForType(currentType);
        }

        // ==================== 加载指定类型的数据 ====================
        async function loadDataForType(type) {
            if (!currentLesson) {
                currentData = [];
                renderEditPanel();
                renderPreviewPanel();
                return;
            }

            currentType = type;

            try {
                const lessonId = currentLesson;
                const doc = await db.collection('lessons').doc(lessonId).get();
                
                if (doc.exists) {
                    const data = doc.data();
                    const fieldName = type === 'component' ? 'components' : 'target_characters';
                    currentData = data[fieldName] || [];
                    
                    // 按 order 排序
                    currentData.sort((a, b) => (a.order || 0) - (b.order || 0));
                } else {
                    currentData = [];
                }
            } catch (error) {
                showMessage('載入失敗：' + error.message, 'error');
                currentData = [];
            }

            renderEditPanel();
            renderPreviewPanel(0); // 显示第一个字符
        }

        // ==================== 更新Tab状态 ====================
        function updateTabState(type) {
            document.querySelectorAll('.type-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            const activeTab = document.querySelector(`.type-tab[data-type="${type}"]`);
            if (activeTab) {
                activeTab.classList.add('active');
            }
        }

        // ==================== Tab切换 ====================
        async function switchTypeTab(newType) {
            // 检查是否已选择课次
            if (!currentLesson) {
                showMessage('請先選擇課次', 'error');
                return;
            }
            
            // 如果类型相同，不切换
            if (currentType === newType) return;
            
            // 标记正在切换，避免显示自动保存消息
            const activeTab = document.querySelector('.type-tab.active');
            if (activeTab) {
                activeTab.classList.add('switching');
            }
            
            // 显示保存提示
            showMessage('💾 正在保存並切換...', 'info');
            
            try {
                // 立即保存当前类型的数据（强制保存）
                if (saveTimeout) clearTimeout(saveTimeout);
                
                // 只有在有当前类型且有数据时才保存
                if (currentType && currentData.length > 0) {
                    try {
                        await saveToFirebase();
                    } catch (saveError) {
                        console.error('保存失败:', saveError);
                        // 保存失败不影响切换
                    }
                }
                
                // 更新Tab状态
                updateTabState(newType);
                
                // 加载新类型的数据
                await loadDataForType(newType);
                
                showMessage(`✅ 已切換到${newType === 'component' ? '部件' : '目標字'}`, 'success');
            } catch (error) {
                console.error('Tab切换错误:', error);
                showMessage('切換失敗：' + error.message, 'error');
                // 即使失败，也尝试更新Tab状态和加载数据
                try {
                    updateTabState(newType);
                    await loadDataForType(newType);
                } catch (loadError) {
                    console.error('加载数据失败:', loadError);
                }
            } finally {
                // 移除切换标记
                if (activeTab) {
                    activeTab.classList.remove('switching');
                }
            }
        }

        // ==================== 保存到 Firebase ====================
        async function saveToFirebase() {
            if (!currentLesson || !currentType) return;

            const lessonId = currentLesson;
            const fieldName = currentType === 'component' ? 'components' : 'target_characters';

            try {
                const sanitized = sanitizeData(currentData);
                await db.collection('lessons').doc(lessonId).set({
                    [fieldName]: sanitized,
                    meta: {
                        [`${fieldName}_count`]: sanitized.length,
                        last_updated: firebase.firestore.FieldValue.serverTimestamp()
                    }
                }, { merge: true });
                
                // 只在非Tab切换时显示自动保存消息（避免干扰）
                const activeTab = document.querySelector('.type-tab.active');
                if (!activeTab || !activeTab.classList.contains('switching')) {
                    showMessage('✅ 已自動保存', 'success');
                }
            } catch (error) {
                showMessage('保存失敗：' + error.message, 'error');
                throw error; // 抛出错误以便调用者处理
            }
        }

        // ==================== 渲染編輯面板 ====================
        function renderEditPanel() {
            const container = document.getElementById('editPanelContent');
            const emptyState = document.getElementById('emptyEditState');

            if (!container) {
                console.error('editPanelContent not found');
                return;
            }

            if (currentData.length === 0) {
                if (emptyState) emptyState.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            if (emptyState) emptyState.style.display = 'none';
            container.innerHTML = currentData.map((item, index) => createFormItem(item, index)).join('');
            
            // 綁定事件
            attachFormEvents();
        }

        function createFormItem(item, index) {
            const charDisplay = renderCharacterDisplay(item);
            const isPublished = item.is_published !== false;
            return `
                <div class="form-item-card collapsed" data-index="${index}">
                    <div class="drag-bar"></div>
                    <div class="form-item-content">
                        <div class="form-item-header" onclick="handleFormItemClick(${index})">
                            <span class="form-item-toggle-icon" onclick="event.stopPropagation(); toggleFormItem(${index})">展</span>
                            <div class="form-item-preview">${charDisplay || '新項目'}</div>
                            <div class="publish-toggle" onclick="event.stopPropagation();">
                                <label class="toggle-switch">
                                    <input type="checkbox" ${isPublished ? 'checked' : ''} onchange="togglePublish(${index}, this.checked)">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="publish-status ${isPublished ? 'published' : 'unpublished'}">
                                    ${isPublished ? '已發布' : '未發布'}
                                </span>
                            </div>
                        </div>
                        <div class="form-item-body">
                        <div class="form-field required">
                            <label>字</label>
                            <input type="text" data-field="character" value="${item.character || ''}" placeholder="例如：夬">
                        </div>
                        <div class="form-field">
                            <label>顯示圖片（字形補丁）</label>
                            <input type="text" data-field="display_image" value="${item.display_image || ''}" placeholder="https://res.cloudinary.com/...">
                            <button type="button" class="btn-upload-cloudinary" data-upload-field="display_image">🖼️ 上傳字形補丁到 Cloudinary</button>
                            <small>當字無法正常顯示時使用</small>
                        </div>
                        <div class="form-field required">
                            <label>拼音</label>
                            <input type="text" data-field="pinyin" value="${item.pinyin || ''}" placeholder="例如：guài">
                        </div>
                        <div class="form-field required">
                            <label>意思（英文）</label>
                            <input type="text" data-field="meaning" value="${item.meaning || ''}" placeholder="例如：to cut apart / separate">
                        </div>
                        <div class="form-field">
                            <label>部件拆解</label>
                            <input type="text" data-field="components_breakdown" value="${item.components_breakdown || ''}" placeholder="例如：ユ + 人">
                        </div>
                        <div class="form-field">
                            <label>書本解釋（支援 Markdown）</label>
                            <textarea data-field="book_explanation" placeholder="可使用 Markdown 格式...">${item.book_explanation || ''}</textarea>
                        </div>
                        <div class="form-field">
                            <label>記憶故事（支援 Markdown）</label>
                            <textarea data-field="story" placeholder="可使用 Markdown 格式...">${item.story || ''}</textarea>
                        </div>
                        <div class="form-field">
                            <label>發音提示（支援 Markdown）</label>
                            <textarea data-field="pronunciation_cue" placeholder="例如：Sounds like **Gwhy**">${item.pronunciation_cue || ''}</textarea>
                        </div>
                        <div class="form-field">
                            <label>圖片網址（輔助插圖）</label>
                            <input type="text" data-field="image" value="${item.image || ''}" placeholder="https://res.cloudinary.com/...">
                            <button type="button" class="btn-upload-cloudinary" data-upload-field="image">🖼️ 上傳輔助插圖到 Cloudinary</button>
                            <small>故事圖、象形演變圖等</small>
                        </div>
                        <div class="form-field">
                            <label>詞組範例</label>
                            <textarea data-field="phrases" placeholder="例如：刚才 gāngcái (just now)">${item.phrases || ''}</textarea>
                        </div>
                        <div class="form-field">
                            <label>記憶例句</label>
                            <input type="text" data-field="example" value="${item.example || ''}" placeholder="例如：COW needs a TOWEL">
                        </div>
                        <div class="form-field">
                            <label>排序</label>
                            <input type="number" data-field="order" value="${item.order || index}" min="0">
                        </div>
                        <button class="btn-delete-item" onclick="deleteItem(${index})">🗑️ 刪除此項目</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleFormItem(index) {
            const card = document.querySelector(`.form-item-card[data-index="${index}"]`);
            if (card) {
                card.classList.toggle('collapsed');
                card.classList.toggle('expanded');
                // 更新按钮文字
                const toggleIcon = card.querySelector('.form-item-toggle-icon');
                if (toggleIcon) {
                    toggleIcon.textContent = card.classList.contains('expanded') ? '收' : '展';
                }
            }
        }

        function expandAllItems() {
            document.querySelectorAll('.form-item-card').forEach(card => {
                card.classList.remove('collapsed');
                card.classList.add('expanded');
                const toggleIcon = card.querySelector('.form-item-toggle-icon');
                if (toggleIcon) {
                    toggleIcon.textContent = '收';
                }
            });
            showMessage('已展開所有項目', 'success');
        }

        function collapseAllItems() {
            document.querySelectorAll('.form-item-card').forEach(card => {
                card.classList.remove('expanded');
                card.classList.add('collapsed');
                const toggleIcon = card.querySelector('.form-item-toggle-icon');
                if (toggleIcon) {
                    toggleIcon.textContent = '展';
                }
            });
            showMessage('已折疊所有項目', 'success');
        }

        function togglePublish(index, checked) {
            if (!currentData[index]) return;
            
            currentData[index].is_published = checked;
            
            // 更新狀態文字顯示
            const statusText = document.querySelector(`.form-item-card[data-index="${index}"] .publish-status`);
            if (statusText) {
                if (checked) {
                    statusText.classList.add('published');
                    statusText.classList.remove('unpublished');
                    statusText.textContent = '已發布';
                } else {
                    statusText.classList.remove('published');

        }

        // ==================== 整課發布/取消發布 ====================

        function addMarkdownFormat(textarea, prefix, suffix) {
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = textarea.value.substring(start, end);

            if (!selectedText) return;

            const leadingSpaces = selectedText.match(/^\s*/)[0];
            const trailingSpaces = selectedText.match(/\s*$/)[0];
            const trimmedText = selectedText.trim();

            const before = textarea.value.substring(0, start);
            const after = textarea.value.substring(end);

            textarea.value = before + leadingSpaces + prefix + trimmedText + suffix + trailingSpaces + after;

            const newStart = start + leadingSpaces.length + prefix.length;
            const newEnd = newStart + trimmedText.length;
            textarea.selectionStart = newStart;
            textarea.selectionEnd = newEnd;
            textarea.focus();
            textarea.dispatchEvent(new Event('input', { bubbles: true }));
        }

        function initMarkdownShortcuts() {
            const container = document.getElementById('editPanelContent');
            if (!container || container.dataset.markdownShortcutsInit) return;
            container.dataset.markdownShortcutsInit = '1';

            container.addEventListener('keydown', (e) => {
                const el = e.target;
                if (!el.matches('textarea[data-field]')) return;
                if (!MARKDOWN_FIELDS.has(el.dataset.field)) return;

                if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                    e.preventDefault();
                    addMarkdownFormat(el, '**', '**');
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
                    e.preventDefault();
                    addMarkdownFormat(el, '*', '*');
                }
            });
        }

            }, (error, result) => {

                    return;

                    showMessage('🖼️ 輔助插圖上傳成功！已自動填入網址', 'success');
                    pendingUploadTarget = null;
                }
            });

                cropping: false,
                multiple: false,
                clientAllowedFormats: ['png', 'jpg', 'jpeg', 'webp'],
                maxFileSize: 10000000,
                styles: CLOUDINARY_WIDGET_STYLES
            }, (error, result) => {

                if (result.event === 'close') {
                    pendingUploadTarget = null;
                    return;
                }
                if (result.event === 'success' && pendingUploadTarget?.field === 'display_image') {
                    setFormFieldValue(pendingUploadTarget.index, 'display_image', result.info.secure_url);

        // ==================== 刪除項目 ====================
        function deleteItem(index) {
            if (!confirm('確定要刪除此項目？')) return;
            
            // 如果删除的是当前预览的字符，切换到第一个字符
            if (index === currentPreviewIndex) {
                currentPreviewIndex = 0;
            } else if (index < currentPreviewIndex) {
                currentPreviewIndex--;
            }
            
            currentData.splice(index, 1);
            // 重新排序
            currentData.forEach((item, i) => {
                item.order = i;
            });
            
            debounceSave();
            renderEditPanel();
            renderPreviewPanel(currentPreviewIndex >= 0 && currentData.length > 0 ? currentPreviewIndex : 0);

        // ==================== 渲染預覽面板 ====================
        let currentPreviewIndex = -1;

        function renderPreviewPanel(index = null) {
            const container = document.getElementById('previewPanelContent');
            const emptyState = document.getElementById('emptyPreviewState');

            if (!container) return;

            if (currentData.length === 0) {
                if (emptyState) emptyState.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            // 如果指定了index，显示该字符；否则显示当前选中的字符
            const displayIndex = index !== null ? index : (currentPreviewIndex >= 0 ? currentPreviewIndex : 0);
            currentPreviewIndex = displayIndex;
            const item = currentData[displayIndex];

            if (!item) {
                if (emptyState) emptyState.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            if (emptyState) emptyState.style.display = 'none';
            
            // 字形補丁系統
            let charDisplay = item.character || '';
            if (item.display_image && item.display_image.trim()) {
                charDisplay = `<img src="${item.display_image.trim()}" class="img-comp" alt="comp" onerror="this.style.display='none';">`;
            } else if (item.character && typeof item.character === 'string' && item.character.trim().toLowerCase().startsWith('http')) {
                charDisplay = `<img src="${item.character.trim()}" class="img-comp" alt="comp" onerror="this.style.display='none';">`;
            }

            let html = `
                <div class="preview-display">
                    <div class="character">${charDisplay}</div>
            `;

            // 拼音
            if (item.pinyin) {
                html += `<div class="pinyin">${item.pinyin}</div>`;
            }

            // 意思
            if (item.meaning) {
                html += `<div class="meaning">${item.meaning}</div>`;
            }

            // 部件拆解
            if (item.components_breakdown) {
                const processedBreakdown = processMarkdownImages(marked.parse(item.components_breakdown));
                html += `<div class="breakdown">${processedBreakdown}</div>`;
            }

            // 圖片（輔助插圖）
            if (item.image && item.image.trim()) {
                html += `<img src="${item.image.trim()}" class="preview-image" alt="${item.character || '輔助插圖'}" onerror="this.style.display='none'">`;
            }

            // 書本解釋
            if (item.book_explanation) {
                const processedExplanation = processMarkdownImages(marked.parse(item.book_explanation));
                html += `
                    <div class="preview-section">
                        <div class="preview-section-title">📖 解釋</div>
                        <div class="preview-section-content markdown-content">${processedExplanation}</div>
                    </div>
                `;
            }

            // 記憶故事
            if (item.story) {
                const processedStory = processMarkdownImages(marked.parse(item.story));
                html += `
                    <div class="preview-section">
                        <div class="preview-section-title">🧠 記憶故事</div>
                        <div class="preview-section-content markdown-content">${processedStory}</div>
                    </div>
                `;
            }

            // 發音提示
            if (item.pronunciation_cue) {
                const processedPronunciation = processMarkdownImages(marked.parse(item.pronunciation_cue));
                html += `
                    <div class="preview-section">
                        <div class="preview-section-title">🔊 發音提示</div>
                        <div class="preview-section-content markdown-content">${processedPronunciation}</div>
                    </div>
                `;
            }

            // 詞組範例
            if (item.phrases) {
                const processedPhrases = processMarkdownImages(marked.parse(item.phrases));
                html += `
                    <div class="preview-section">
                        <div class="preview-section-title">💬 詞組範例</div>
                        <div class="preview-section-content markdown-content">${processedPhrases}</div>
                    </div>
                `;
            }

            // 例句
            if (item.example) {
                html += `
                    <div class="preview-section">
                        <div class="preview-section-title">💡 例句</div>
                        <div class="preview-section-content markdown-content">${item.example}</div>
                    </div>
                `;
            }

            html += `</div>`;
            container.innerHTML = html;
            
            // 滚动到顶部
            container.scrollTop = 0;
        }

        // 处理 Markdown 图片分类（类似 lesson-presentation.html）
        function processMarkdownImages(htmlContent) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;
            const images = tempDiv.querySelectorAll('img');
            images.forEach(img => {
                const alt = (img.getAttribute('alt') || '').toLowerCase();
                if (alt.includes('comp')) {
                    img.className = 'img-comp';
                } else if (alt.includes('origin')) {
                    img.className = 'img-origin';
                } else if (alt.includes('story')) {
                    img.className = 'img-story';
                }
                img.setAttribute('onerror', "this.style.display='none'");
            });
            return tempDiv.innerHTML;
        }


        // ==================== 拖拽排序 ====================
        // 拖拽事件處理函數（命名函數，避免重複綁定）
        function handleDragMouseMove(e) {
            if (!isDragging || !draggedElement) return;
            
            e.preventDefault();
            
            const container = document.getElementById('editPanelContent');
            if (!container) return;
            
            const mouseY = e.clientY;
            
            // 讓卡片在 Y 軸跟隨滑鼠
            if (dragInitialRect) {
                draggedElement.style.position = 'fixed';
                draggedElement.style.left = dragInitialRect.left + 'px';
                draggedElement.style.top = (mouseY - dragOffsetY) + 'px';
                draggedElement.style.width = dragInitialRect.width + 'px';
                draggedElement.style.zIndex = '9999';
                draggedElement.style.pointerEvents = 'none';
            }
            
            // 找到應該插入的位置（基於滑鼠 Y 位置）
            const afterElement = getDragAfterElement(container, mouseY);
            
            // 如果插入位置沒有改變，不需要更新
            if (afterElement === lastAfterElement) return;
            lastAfterElement = afterElement;
            
            // 移除舊的 placeholder
            if (currentPlaceholder) {
                currentPlaceholder.remove();
                currentPlaceholder = null;
            }
            
            // 重置所有卡片的 transform
            container.querySelectorAll('.form-item-card:not(.dragging)').forEach(card => {
                card.style.transform = '';
            });
            
            // 創建新的 placeholder
            if (dragInitialRect) {
                currentPlaceholder = document.createElement('div');
                currentPlaceholder.style.height = dragInitialRect.height + 'px';
                currentPlaceholder.style.marginBottom = 'var(--spacing-md)';
                currentPlaceholder.className = 'drag-placeholder';
                currentPlaceholder.style.opacity = '0.3';
                currentPlaceholder.style.border = '2px dashed var(--primary-color)';
                currentPlaceholder.style.borderRadius = 'var(--radius-lg)';
                
                if (afterElement == null) {
                    // 移動到最後
                    container.appendChild(currentPlaceholder);
                } else {
                    // 插入到指定位置
                    container.insertBefore(currentPlaceholder, afterElement);
                }
            }
        }
        
        function handleDragMouseUp(e) {
            if (!isDragging || !draggedElement) {
                return;
            }
            
            console.log('✅ 拖拽結束');
            e.preventDefault();
            
            const container = document.getElementById('editPanelContent');
            if (!container) return;
            
            // 恢復卡片的正常定位
            draggedElement.style.position = '';
            draggedElement.style.left = '';
            draggedElement.style.top = '';
            draggedElement.style.width = '';
            draggedElement.style.zIndex = '';
            draggedElement.style.pointerEvents = '';
            
            // 重置其他卡片的 transform
            container.querySelectorAll('.form-item-card:not(.dragging)').forEach(card => {
                card.style.transform = '';
            });
            
            // 如果有 placeholder，將卡片插入到 placeholder 的位置
            if (currentPlaceholder) {
                const placeholderIndex = Array.from(container.children).indexOf(currentPlaceholder);
                container.insertBefore(draggedElement, currentPlaceholder);
                currentPlaceholder.remove();
                currentPlaceholder = null;
                
                // 計算新位置
                const newIndex = Array.from(container.children).indexOf(draggedElement);
                const oldIndex = parseInt(draggedElement.dataset.index);
                
                console.log('位置變化:', { oldIndex, newIndex });
                
                if (oldIndex !== newIndex && newIndex >= 0) {
                    // 更新資料順序
                    const [movedItem] = currentData.splice(oldIndex, 1);
                    currentData.splice(newIndex, 0, movedItem);
                    
                    // 更新 order
                    currentData.forEach((item, i) => {
                        item.order = i;
                    });
                    
                    debounceSave();
                    renderEditPanel();
                    renderPreviewPanel(currentPreviewIndex >= 0 ? currentPreviewIndex : 0);
                }
            }
            
            // 移除拖拽樣式
            draggedElement.classList.remove('dragging');
            
            // 重置狀態
            isDragging = false;
            draggedElement = null;
            dragOffsetY = 0;
            dragInitialRect = null;
            lastAfterElement = null;
            document.body.style.userSelect = '';
            document.body.style.cursor = '';
        }
        
        function initDragAndDrop() {
            const container = document.getElementById('editPanelContent');
            if (!container) return;
            
            // 只初始化一次全局事件監聽器
            if (!dragHandlersInitialized) {
                document.addEventListener('mousemove', handleDragMouseMove);
                document.addEventListener('mouseup', handleDragMouseUp);
                dragHandlersInitialized = true;
            }
            
            // 使用事件委派，只在拖拽條上監聽 mousedown
            // 使用 capture 階段確保優先處理
            container.addEventListener('mousedown', (e) => {
                // 先檢查是否直接點擊在拖拽條上
                const dragBar = e.target.closest('.drag-bar');
                const card = e.target.closest('.form-item-card');
                
                if (!card) return;
                
                // 方法1: 如果直接點擊在拖拽條上
                if (dragBar) {
                    console.log('✅ 拖拽開始 (直接點擊拖拽條)');
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    
                    isDragging = true;
                    draggedElement = card;
                    
                    // 記錄初始位置和偏移
                    const cardRect = card.getBoundingClientRect();
                    dragInitialRect = {
                        left: cardRect.left,
                        top: cardRect.top,
                        width: cardRect.width,
                        height: cardRect.height
                    };
                    dragOffsetY = e.clientY - cardRect.top;
                    
                    // 添加拖拽樣式
                    card.classList.add('dragging');
                    
                    // 防止文字選擇
                    document.body.style.userSelect = 'none';
                    document.body.style.cursor = 'grabbing';
                    return;
                }
                
                // 方法2: 檢查點擊位置是否在拖拽條內（左側12px範圍內）
                const cardRect = card.getBoundingClientRect();
                const clickX = e.clientX - cardRect.left;
                
                console.log('拖拽檢測:', {
                    clickX: clickX,
                    cardLeft: cardRect.left,
                    clientX: e.clientX,
                    target: e.target.tagName,
                    targetClass: e.target.className,
                    hasDragBar: !!dragBar
                });
                
                // 如果點擊在左側12px範圍內，則視為拖拽條點擊
                if (clickX <= 12) {
                    console.log('✅ 拖拽開始 (位置檢測)');
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                    
                    isDragging = true;
                    draggedElement = card;
                    
                    // 記錄初始位置和偏移
                    dragInitialRect = {
                        left: cardRect.left,
                        top: cardRect.top,
                        width: cardRect.width,
                        height: cardRect.height
                    };
                    dragOffsetY = e.clientY - cardRect.top;
                    
                    // 添加拖拽樣式
                    card.classList.add('dragging');
                    
                    // 防止文字選擇
                    document.body.style.userSelect = 'none';
                    document.body.style.cursor = 'grabbing';
                }
            }, true); // 使用 capture 階段
        }

        function getDragAfterElement(container, mouseY) {
            // 排除拖拽中的卡片和 placeholder
            const draggableElements = [...container.querySelectorAll('.form-item-card:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = mouseY - box.top - box.height / 2;
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // ==================== 面板寬度調整 ====================
        function initResizer() {
            const resizer = document.getElementById('resizer');
            const editPanel = document.getElementById('editPanel');
            let isResizing = false;

            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                resizer.classList.add('resizing');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;

                const containerRect = document.querySelector('.studio-container').getBoundingClientRect();
                const newWidth = ((e.clientX - containerRect.left) / containerRect.width) * 100;
                
                if (newWidth >= 5 && newWidth <= 60) {
                    editPanel.style.width = `${newWidth}%`;
                }
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    resizer.classList.remove('resizing');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        // ==================== 切換編輯面板 ====================
        function initToggleEdit() {
            const btn = document.getElementById('btnToggleEdit');
            const editPanel = document.getElementById('editPanel');

            btn.addEventListener('click', () => {
                editPanel.classList.toggle('collapsed');
                btn.textContent = editPanel.classList.contains('collapsed') ? '▶' : '◀';
            });
        }


        // ==================== 初始化 ====================
        // Tab切换事件
        document.querySelectorAll('.type-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                if (!tab.disabled) {
                    const type = tab.dataset.type;
                    switchTypeTab(type);
                }
            });
        });
        
        populateLessonSelect(document.getElementById('lessonSelect'), currentCourse);
        updateStudioTabsForCourse(currentCourse);
        document.getElementById('courseSelect').addEventListener('change', handleCourseChange);
        document.getElementById('lessonSelect').addEventListener('change', loadData);
        document.getElementById('btnAdd').addEventListener('click', addItem);
        document.getElementById('btnExpandAll').addEventListener('click', expandAllItems);
        document.getElementById('btnCollapseAll').addEventListener('click', collapseAllItems);
        document.getElementById('btnPublishAll').addEventListener('click', publishAll);
        document.getElementById('btnUnpublishAll').addEventListener('click', unpublishAll);
        initResizer();
        initToggleEdit();
        initDragAndDrop();
        initMarkdownShortcuts();
        initCloudinaryUpload();

        // 載入全域導航腳本
        const navScript = document.createElement('script');
        navScript.src = '../../assets/js/nav-global.js';
        document.body.appendChild(navScript);
    </script>
</body>
